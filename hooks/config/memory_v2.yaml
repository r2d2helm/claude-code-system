extraction:
  max_per_type: 5
  min_content_length: 30
  max_transcript_lines: 500
  importance_defaults:
    tool_sequence: 7.0
    problem_solution: 7.5
    decision: 6.5
    insight: 6.0
    pattern: 6.0
retrieval:
  startup:
    max_chars: 1500
    max_facts: 8
    max_memories: 8
    facts_min_confidence: 0.7
    memories_min_importance: 5.5
    memories_days_back: 14
  per_prompt:
    max_chars: 800
    max_results: 5
    min_message_length: 15
    skip_commands: true
  scoring:
    recency_boost_7d: 0.5
    recency_boost_14d: 0.3
    decay_rate_per_week: 0.9
  deep:
    max_chars: 5000
    max_facts: 15
    max_memories: 15
    memories_min_importance: 4.0
    memories_days_back: 30
consolidation:
  decay_threshold_days: 7
  decay_factor: 0.9
  prune_min_score: 0.5
  prune_min_age_days: 30
  promote_min_access: 3
  promote_boost: 1.0
  merge_similarity_threshold: 0.6
signals:
  complexity:
    low: 5
    medium: 15
    high: 100
  duration:
    short: 300
    medium: 1800
    long: 86400
  error_threshold: 3
heartbeat:
  interval_seconds: 1800
  disk_warning_percent: 80
  disk_critical_percent: 95
  disk_mountpoints: []
  docker_restart_threshold: 5
  critical_services:
  - ssh
  - docker
  - ufw
  check_apt_updates: true
  log_lines_to_check: 100
  log_error_patterns:
  - error
  - failed
  - critical
  - out of memory
  - segfault
  memory_importance: 5.0
  memory_importance_critical: 8.0
  monitoring_hosts:
    vm100: 192.168.1.162
    proxmox: 192.168.1.215
infrastructure:
  vm100:
    host: 192.168.1.162
    ports:
      taskyn_mcp: 8020
      taskyn_web: 3020
      knowledge_assistant_http: 8030
  proxmox:
    host: 192.168.1.215
    port: 8006
context_cache:
  ttl_seconds: 300
