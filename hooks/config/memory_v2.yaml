convergence:
  enabled: true
  track_first_shot_ratio: true
  track_correction_count: true
  decay_window_days: 30
  dashboard_path: _Index/Convergence-Dashboard.md
degradation:
  enabled: true
  repeat_error_threshold: 3
  skill_atrophy_days: 30
  memory_staleness_days: 60
  convergence_drop_alert: 0.15
  report_frequency: weekly
feedback_loop:
  enabled: true
  auto_generate: true
  inject_previous_session: true
  max_feedback_chars: 500
  types:
  - success
  - correction
  - emergence
